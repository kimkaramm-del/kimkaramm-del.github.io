<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  min-height: 100vh;
  color: #111;
  background: linear-gradient(-45deg, #0f172a, #1f4037, #2c5364, #111827);
  background-size: 400% 400%;
  animation: bgMove 14s ease infinite;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.12), transparent 24%),
    radial-gradient(circle at 80% 30%, rgba(59,130,246,0.14), transparent 22%),
    radial-gradient(circle at 50% 80%, rgba(34,197,94,0.10), transparent 26%);
  filter: blur(2px);
  opacity: 0.8;
  animation: glowMove 18s ease-in-out infinite alternate;
  z-index: -1;
}

@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes glowMove {
  0% { transform: translate3d(0, 0, 0) scale(1); }
  100% { transform: translate3d(0, -10px, 0) scale(1.03); }
}

.header {
  background: rgba(15, 23, 42, 0.72);
  backdrop-filter: blur(12px);
  color: white;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.logo {
  font-weight: bold;
  margin-right: 6px;
  white-space: nowrap;
}

.search {
  flex: 1;
  padding: 10px 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.96);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.search:focus {
  transform: translateY(-1px);
  box-shadow: 0 10px 24px rgba(0,0,0,0.18);
}

.nav {
  background: rgba(17, 24, 39, 0.72);
  backdrop-filter: blur(10px);
  color: white;
  padding: 10px;
  display: flex;
  gap: 10px;
  overflow-x: auto;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.nav div {
  cursor: pointer;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  white-space: nowrap;
  transition: transform 0.2s ease, background 0.2s ease;
}

.nav div:hover {
  transform: translateY(-1px);
  background: rgba(255,255,255,0.14);
}

.banner {
  position: relative;
  min-height: 280px;
  background:
    linear-gradient(180deg, rgba(2,6,23,0.15), rgba(2,6,23,0.72)),
    url("https://images.unsplash.com/photo-1472851294608-062f824d29cc?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
  display: flex;
  align-items: flex-end;
  padding: 22px;
  color: white;
  text-shadow: 0 2px 12px rgba(0,0,0,0.6);
  overflow: hidden;
}

.banner-content {
  position: relative;
  z-index: 1;
  max-width: 650px;
}

.banner h2 {
  margin: 0;
  font-size: clamp(24px, 4vw, 46px);
  line-height: 1.05;
}

.banner p {
  margin: 10px 0 0;
  font-size: 15px;
  opacity: 0.95;
  max-width: 560px;
}

.banner-badge {
  display: inline-block;
  margin-top: 14px;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.16);
  backdrop-filter: blur(8px);
  font-size: 13px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  padding: 14px;
  transition: opacity 0.25s ease, transform 0.25s ease;
}

.products.loading {
  opacity: 0.45;
  transform: translateY(6px);
}

.card {
  position: relative;
  background: rgba(255,255,255,0.90);
  backdrop-filter: blur(8px);
  padding: 10px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  overflow: hidden;
  opacity: 0;
  transform: translateY(24px) scale(0.98);
  transition:
    transform 0.35s ease,
    box-shadow 0.35s ease,
    opacity 0.6s ease,
    filter 0.35s ease;
}

.card.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 16px 40px rgba(0,0,0,0.18);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 12px;
  display: block;
}

.card h4 {
  margin: 10px 0 6px;
  font-size: 15px;
}

.card p {
  margin: 0 0 8px;
  font-size: 13px;
  color: #4b5563;
  min-height: 34px;
}

.price {
  color: #15803d;
  font-weight: bold;
  font-size: 15px;
}

.like-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 38px;
  height: 38px;
  border: none;
  border-radius: 999px;
  background: rgba(255,255,255,0.82);
  color: #111;
  font-size: 18px;
  cursor: pointer;
  display: grid;
  place-items: center;
  box-shadow: 0 8px 18px rgba(0,0,0,0.14);
  transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
}

.like-btn:hover {
  transform: scale(1.08);
}

.like-btn.liked {
  background: rgba(255, 228, 230, 0.95);
  color: #e11d48;
}

.no-results {
  color: white;
  text-align: center;
  padding: 30px 10px 60px;
  width: 100%;
}

@media (max-width: 600px) {
  .header {
    gap: 8px;
  }

  .banner {
    min-height: 220px;
    padding: 18px;
  }

  .products {
    grid-template-columns: 1fr;
  }

  .card img {
    height: 220px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">MyStore</div>
  <input class="search" placeholder="Search...">
</div>

<div class="nav">
  <div onclick="setCategory('all')">All</div>
  <div onclick="setCategory('electronics')">Electronics</div>
  <div onclick="setCategory('fashion')">Fashion</div>
  <div onclick="setCategory('gaming')">Gaming</div>
</div>

<div class="banner">
  <div class="banner-content">
    <h2>Discover fresh products in a modern store</h2>
    <p>A clean storefront with smooth motion, trending items, and a premium shopping feel.</p>
    <div class="banner-badge">250+ products ready to explore</div>
  </div>
</div>

<div class="products" id="products"></div>

<script>
let allProducts = [];
let currentCategory = "all";
let likedProducts = JSON.parse(localStorage.getItem("likedProducts")) || [];
let filterTimer = null;
let cardObserver = null;

function escapeHTML(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

// عرض المنتجات
function displayProducts(data) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  if (data.length === 0) {
    container.innerHTML = `<div class="no-results">Sorry no products found </div>`;
    setupScrollAnimation();
    return;
  }

  container.innerHTML = data.map((item, index) => {
    const liked = likedProducts.includes(item.title);
    const delay = Math.min(index * 70, 700);

    return `
      <article class="card" style="transition-delay: ${delay}ms;">
        <button class="like-btn ${liked ? "liked" : ""}" type="button" data-title="${encodeURIComponent(item.title)}" aria-label="Like product">
          ${liked ? "❤" : "♡"}
        </button>

        <img src="${item.image}" alt="${escapeHTML(item.title)}">
        <h4>${escapeHTML(item.title)}</h4>
        <p>${escapeHTML(item.desc)}</p>
        <div class="price">${escapeHTML(item.price)}</div>
      </article>
    `;
  }).join("");

  bindLikeButtons();
  setupScrollAnimation();
}

// Scroll animation
function setupScrollAnimation() {
  if (cardObserver) {
    cardObserver.disconnect();
  }

  const cards = document.querySelectorAll(".card");
  cardObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("show");
        cardObserver.unobserve(entry.target);
      }
    });
  }, {
    threshold: 0.18
  });

  cards.forEach(card => cardObserver.observe(card));
}

// Like buttons
function bindLikeButtons() {
  document.querySelectorAll(".like-btn").forEach(button => {
    button.addEventListener("click", (event) => {
      event.stopPropagation();
      const title = decodeURIComponent(button.dataset.title);
      toggleLike(title);
    });
  });
}

function toggleLike(title) {
  const idx = likedProducts.indexOf(title);

  if (idx >= 0) {
    likedProducts.splice(idx, 1);
  } else {
    likedProducts.push(title);
  }

  localStorage.setItem("likedProducts", JSON.stringify(likedProducts));
  applyFilters();
}

// تحميل المنتجات
fetch("data.json")
  .then(res => res.json())
  .then(data => {
    allProducts = data;
    applyFilters();
  })
  .catch(() => {
    document.getElementById("products").innerHTML =
      `<div class="no-results">Could not load data.json</div>`;
  });

// فلترة + بحث
function applyFilters() {
  clearTimeout(filterTimer);

  const container = document.getElementById("products");
  container.classList.add("loading");

  filterTimer = setTimeout(() => {
    const value = document.querySelector(".search").value.toLowerCase().trim();

    const filtered = allProducts.filter(item => {
      const title = (item.title || "").toLowerCase();
      const desc = (item.desc || "").toLowerCase();
      const category = (item.category || "").toLowerCase();

      const matchSearch = title.includes(value) || desc.includes(value);
      const matchCategory = currentCategory === "all" || category === currentCategory;

      return matchSearch && matchCategory;
    });

    displayProducts(filtered);
    requestAnimationFrame(() => container.classList.remove("loading"));
  }, 140);
}

fetch("https://store-api-jjjm.onrender.com/products")
  .then(res => res.json())
  .then(data => {
    console.log(data);
    document.body.innerHTML = JSON.stringify(data);
  });
  .catch((err) => {
    document.getElementById("products").innerHTML =
      `<div class="no-results">ERROR: ${err}</div>`;  });

// البحث
document.querySelector(".search").addEventListener("input", applyFilters);

// الفلاتر
function setCategory(cat) {
  currentCategory = cat;
  applyFilters();
}
</script>

</body>
</html>
